name: Brain Bulletin Board

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:

concurrency:
  group: brainstorm-local-bulletin
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  bulletin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Poll Cosmos & sync issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSMOS_ENDPOINT: ${{ secrets.COSMOS_ENDPOINT }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
        run: |
          python3 .github/scripts/bulletin-board-github.py

      - name: Commit state changes
        run: |
          git config user.name "brain[bot]"
          git config user.email "brain[bot]@users.noreply.github.com"
          git add state/ || true
          if ! git diff --cached --quiet; then
            git commit -m "brain: bulletin $(date -u +%Y-%m-%dT%H:%M)"
            git push
          fi
